services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atoms
      POSTGRES_USER: atoms
      POSTGRES_PASSWORD: atoms_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atoms"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://atoms:atoms_dev_password@postgres:5432/atoms
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
